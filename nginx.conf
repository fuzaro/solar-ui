worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;

    map $uri $cache_control {
        ~*\.(js|css|woff2?|png|svg|ico|jpg|webp)$  "public, max-age=31536000, immutable";
        default                                      "no-cache";
    }

    server {
        listen 8080 default_server;
        server_name _;

        add_header Cache-Control $cache_control;

        # Runtime config (generated by entrypoint.sh)
        location = /__config.js {
            alias /srv/__config.js;
            add_header Cache-Control "no-cache";
        }

        # Engineering Portal
        location /engineering/ {
            alias /srv/engineering/;
            index index.html;
            try_files $uri $uri/ /engineering/index.html;
        }

        # Control Plane
        location /control/ {
            alias /srv/control/;
            index index.html;
            try_files $uri $uri/ /control/index.html;
        }

        # Console (default — everything else)
        location / {
            root /srv/console;
            index index.html;
            try_files $uri $uri/ /index.html;
        }
    }
}
