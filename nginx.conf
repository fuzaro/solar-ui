worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;

    # Cache static assets
    map $uri $cache_control {
        ~*\.(js|css|woff2?|png|svg|ico|jpg|webp)$  "public, max-age=31536000, immutable";
        default                                      "no-cache";
    }

    # Route by Host header — primary mechanism
    # Fallback: path-based routing for local/dev without DNS

    # Console (default)
    server {
        listen 8080 default_server;
        server_name app.solarsystems.ai "";

        root /srv/console;
        index index.html;

        add_header Cache-Control $cache_control;

        location / {
            try_files $uri $uri/ /index.html;
        }
    }

    # Control Plane
    server {
        listen 8080;
        server_name manage.solarsystems.ai;

        root /srv/control;
        index index.html;

        add_header Cache-Control $cache_control;

        location / {
            try_files $uri $uri/ /index.html;
        }
    }

    # Engineering Portal
    server {
        listen 8080;
        server_name ops.solarsystems.ai;

        root /srv/engineering;
        index index.html;

        add_header Cache-Control $cache_control;

        location / {
            try_files $uri $uri/ /index.html;
        }
    }

    # Path-based fallback (when no Host header matches a named server)
    # Access via: /control/* and /engineering/*
    # Console is at / (default_server handles it)
    server {
        listen 8080;
        server_name localhost;

        location /control/ {
            alias /srv/control/;
            try_files $uri $uri/ /control/index.html;
        }

        location /engineering/ {
            alias /srv/engineering/;
            try_files $uri $uri/ /engineering/index.html;
        }

        location / {
            root /srv/console;
            try_files $uri $uri/ /index.html;
        }

        add_header Cache-Control $cache_control;
    }
}
